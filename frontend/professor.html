<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professor · Atrium</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <header class="site-header">
      <a href="index.html" class="site-title">Atrium</a>
      <div class="site-tagline">A quiet space for students to share what they know.</div>
      <nav class="site-nav">
        <a href="index.html">Recent</a>
        <a href="professors.html">Professors</a>
      </nav>
    </header>

    <main>
      <section id="professor-header">
        <div class="loading">Loading professor…</div>
      </section>

      <section id="insights-container" style="margin-top: 32px;"></section>

      <section id="form-container" class="form-section"></section>
    </main>

    <footer class="site-footer">
      Atrium · Built for students, by students. All data shown is fictional.
    </footer>

  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      Atrium.renderProfessorDetail({
        headerId: 'professor-header',
        insightsId: 'insights-container',
        formId: 'form-container',
      });
    });
  </script>
</body>
</html>
